<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bucks2Bar - Income & Expense Tracker</title>
    <!-- Bootstrap 5 CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #f8f9fa;
        padding: 20px;
      }
      .container-main {
        max-width: 1200px;
        margin: 0 auto;
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        padding: 30px;
      }
      .header {
        text-align: center;
        margin-bottom: 30px;
      }
      .header h1 {
        color: #2c3e50;
        font-weight: 700;
      }
      .nav-tabs .nav-link {
        color: #495057;
        border-color: #dee2e6;
      }
      .nav-tabs .nav-link.active {
        color: #0d6efd;
        border-bottom: 3px solid #0d6efd;
        background-color: transparent;
      }
      .data-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 20px;
      }
      .data-table thead {
        background-color: #0d6efd;
        color: white;
        font-weight: 600;
      }
      .data-table th {
        padding: 12px;
        text-align: left;
        border: 1px solid #dee2e6;
      }
      .data-table td {
        padding: 12px;
        border: 1px solid #dee2e6;
      }
      .data-table tbody tr:nth-child(even) {
        background-color: #f8f9fa;
      }
      .data-table tbody tr:hover {
        background-color: #e9ecef;
      }
      .input-group-text {
        background-color: #e9ecef;
      }
      #expenseChart {
        max-height: 600px;
      }
      .chart-container {
        position: relative;
        height: 500px;
        margin-top: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container-main">
      <!-- Header -->
      <div class="header">
        <h1>💰 Bucks2Bar</h1>
        <p class="text-muted">Track your monthly income and expenses</p>
      </div>

      <!-- Tab Navigation -->
      <ul class="nav nav-tabs" id="bucks2barTabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button
            class="nav-link active"
            id="data-tab"
            data-bs-toggle="tab"
            data-bs-target="#data-content"
            type="button"
            role="tab"
            aria-controls="data-content"
            aria-selected="true"
          >
            Data
          </button>
        </li>
        <li class="nav-item" role="presentation">
          <button
            class="nav-link"
            id="chart-tab"
            data-bs-toggle="tab"
            data-bs-target="#chart-content"
            type="button"
            role="tab"
            aria-controls="chart-content"
            aria-selected="false"
          >
            Chart
          </button>
        </li>
      </ul>

      <!-- Tab Content -->
      <div class="tab-content" id="bucks2barContent">
        <!-- Data Tab -->
        <div
          class="tab-pane fade show active"
          id="data-content"
          role="tabpanel"
          aria-labelledby="data-tab"
        >
          <table class="data-table">
            <thead>
              <tr>
                <th>Month</th>
                <th>Income (USD)</th>
                <th>Expenses (USD)</th>
              </tr>
            </thead>
            <tbody id="monthsContainer"></tbody>
          </table>
        </div>

        <!-- Chart Tab -->
        <div
          class="tab-pane fade"
          id="chart-content"
          role="tabpanel"
          aria-labelledby="chart-tab"
        >
          <div class="chart-container">
            <canvas id="expenseChart"></canvas>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Chart.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <!-- Application Script -->
    <script src="script.js"></script>
  </body>
</html>
